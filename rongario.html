<body>
    <h1>RonGario</h1>

<a href="https://ronlab.site" class="site-button">
    <img src="/favicon.ico" alt="Ron Lab" class="favicon">   
</a>

    <div id="scoreDisplay">
        <span id="totalPoints">Total Points: 0</span>
        <span id="currentPoints">Current Points: 0</span>
        <span id="botsAbsorbed">Bots Absorbed: 0</span>
        <span id="highScore">High Score: 0</span>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <input type="range" id="colorPicker" min="0" max="360" value="240" step="1">
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const totalPointsDisplay = document.getElementById('totalPoints');
        const currentPointsDisplay = document.getElementById('currentPoints');
        const botsAbsorbedDisplay = document.getElementById('botsAbsorbed');
        const highScoreDisplay = document.getElementById('highScore');

        // Player object
        class Player {
            constructor(x, y, radius, color, isBot = false) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = isBot ? `hsl(${Math.random() * 360}, 70%, 50%)` : color;
                this.isBot = isBot;
                this.speed = this.calculateSpeed();
                this.dx = 0;
                this.dy = 0;
                this.split = false;
                this.twins = [];
                this.mergeStart = new Map();
                this.lastSplitTime = Date.now(); // Track last split for bots
                this.totalPoints = radius; // Initialize with starting radius
                this.botsAbsorbed = 0; // Track bots absorbed
            }

            calculateSpeed() {
                if (this.radius < 25) return 375 / this.radius;
                if (this.radius >= 35) return 250 / this.radius;
                let t = (this.radius - 25) / 10;
                return (375 / this.radius) * (1 - t) + (250 / this.radius) * t;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.fillStyle = 'black';
                ctx.font = '12px Arial';
                ctx.fillText(Math.round(this.radius), this.x - 10, this.y - this.radius - 5);
                this.twins.forEach(twin => twin.draw());
            }

            move(deltaTime) {
                if (this.isBot) {
                    if (Math.random() < 0.01) {
                        this.dx = (Math.random() - 0.5) * 2;
                        this.dy = (Math.random() - 0.5) * 2;
                    }
                }
                let moveX = this.dx * this.speed * deltaTime;
                let moveY = this.dy * this.speed * deltaTime;
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x + moveX));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y + moveY));
                this.twins.forEach(twin => {
                    // Apply gravity toward main dot
                    let dist = Math.sqrt((twin.x - this.x) ** 2 + (twin.y - this.y) ** 2);
                    let gravityStrength = 0.1 / (dist + 1); // Weaker when far
                    let gravityDx = (this.x - twin.x) * gravityStrength;
                    let gravityDy = (this.y - twin.y) * gravityStrength;
                    twin.dx = this.dx + gravityDx;
                    twin.dy = this.dy + gravityDy;
                    let twinMoveX = twin.dx * twin.speed * deltaTime;
                    let twinMoveY = twin.dy * twin.speed * deltaTime;
                    twin.x = Math.max(twin.radius, Math.min(canvas.width - twin.radius, twin.x + twinMoveX));
                    twin.y = Math.max(twin.radius, Math.min(canvas.height - twin.radius, twin.y + twinMoveY));
                });
            }

            calculateTotalPoints() {
                let totalPoints = this.radius;
                this.twins.forEach(twin => {
                    totalPoints += twin.radius;
                });
                return totalPoints;
            }

            canSplit() {
                let totalPoints = this.calculateTotalPoints();
                let currentDots = this.twins.length + 1;
                let newDots = 0;
                if (this.radius >= 4) newDots++;
                this.twins.forEach(twin => {
                    if (twin.radius >= 4) newDots++;
                });
                let minRadius = 2;
                let maxPossibleDots = Math.floor(totalPoints / minRadius);
                return currentDots + newDots <= maxPossibleDots;
            }

            splitPlayer(dx, dy) {
                if (!this.canSplit()) return;
                let splitDots = [];
                if (this.radius >= 4) {
                    let newRadius1 = Math.floor(this.radius / 2);
                    let newRadius2 = this.radius - newRadius1;
                    this.radius = newRadius1;
                    this.speed = this.calculateSpeed();
                    let twin = new Player(this.x, this.y, newRadius2, this.color, this.isBot);
                    let angle = (dx === 0 && dy === 0) ? Math.random() * Math.PI * 2 : Math.atan2(dy, dx);
                    twin.x += Math.cos(angle) * (this.radius + twin.radius + 10);
                    twin.y += Math.sin(angle) * (this.radius + twin.radius + 10);
                    twin.dx = dx;
                    twin.dy = dy;
                    splitDots.push(twin);
                }
                this.twins.forEach(twin => {
                    if (twin.radius >= 4 && this.canSplit()) {
                        let newRadius1 = Math.floor(twin.radius / 2);
                        let newRadius2 = twin.radius - newRadius1;
                        twin.radius = newRadius1;
                        twin.speed = twin.calculateSpeed();
                        let newTwin = new Player(twin.x, twin.y, newRadius2, this.color, this.isBot);
                        let angle = (dx === 0 && dy === 0) ? Math.random() * Math.PI * 2 : Math.atan2(dy, dx);
                        newTwin.x += Math.cos(angle) * (twin.radius + newTwin.radius + 10);
                        newTwin.y += Math.sin(angle) * (twin.radius + newTwin.radius + 10);
                        newTwin.dx = dx;
                        newTwin.dy = dy;
                        splitDots.push(newTwin);
                    }
                });
                this.twins.push(...splitDots);
                this.split = this.twins.length > 0;
            }
        }

        // Food object
        class Food {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        // Game state
        function randomRadius() {
            return Math.floor(Math.random() * 10) + 7; // 7 to 16
        }
        let player = new Player(
            Math.random() * (canvas.width - 50) + 25,
            Math.random() * (canvas.height - 50) + 25,
            randomRadius(),
            'hsl(240, 70%, 50%)'
        );
        let bots = [
            new Player(
                Math.random() * (canvas.width - 50) + 25,
                Math.random() * (canvas.height - 50) + 25,
                randomRadius(),
                '',
                true
            ),
            new Player(
                Math.random() * (canvas.width - 50) + 25,
                Math.random() * (canvas.height - 50) + 25,
                randomRadius(),
                '',
                true
            )
        ];
        let foods = [];
        for (let i = 0; i < 50; i++) {
            foods.push(new Food(Math.random() * canvas.width, Math.random() * canvas.height));
        }
        let highScore = parseFloat(localStorage.getItem('agarHighScore')) || 0; // Load high score

        // Color picker
        colorPicker.addEventListener('input', () => {
            player.color = `hsl(${colorPicker.value}, 70%, 50%)`;
            player.twins.forEach(twin => twin.color = player.color);
        });

        // Keyboard controls
        let keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') {
                player.splitPlayer(player.dx, player.dy);
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function updatePlayerDirection() {
            player.dx = 0;
            player.dy = 0;
            if (keys['w']) player.dy = -1;
            if (keys['s']) player.dy = 1;
            if (keys['a']) player.dx = -1;
            if (keys['d']) player.dx = 1;
            if (player.dx !== 0 || player.dy !== 0) {
                let mag = Math.sqrt(player.dx * player.dx + player.dy * player.dy);
                player.dx /= mag;
                player.dy /= mag;
            }
            player.twins.forEach(twin => {
                twin.dx = player.dx;
                twin.dy = player.dy;
            });
        }

        // Collision detection
        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        function getCollisionThreshold(radius) {
            if (radius < 15) return 3;
            if (radius < 25) return 5;
            if (radius < 45) return 7;
            return 10;
        }

        function checkMergeCollisions(player) {
            let allDots = [player, ...player.twins];
            let parent = new Map();
            function find(dot) {
                if (!parent.has(dot)) parent.set(dot, dot);
                if (parent.get(dot) !== dot) parent.set(dot, find(parent.get(dot)));
                return parent.get(dot);
            }
            function union(dot1, dot2) {
                let root1 = find(dot1);
                let root2 = find(dot2);
                if (root1 !== root2) parent.set(root1, root2);
            }

            // Collect all overlapping pairs and set timers
            let validKeys = new Set();
            let overlaps = [];
            for (let i = 0; i < allDots.length; i++) {
                for (let j = i + 1; j < allDots.length; j++) {
                    let dot1 = allDots[i];
                    let dot2 = allDots[j];
                    let dist = distance(dot1.x, dot1.y, dot2.x, dot2.y);
                    let key = `${Math.min(i, j)}-${Math.max(i, j)}`;
                    if (dist < dot1.radius + dot2.radius) {
                        overlaps.push([dot1, dot2, key]);
                        if (!player.mergeStart.has(key)) player.mergeStart.set(key, Date.now());
                        validKeys.add(key);
                    }
                }
            }
            // Remove outdated timers
            player.mergeStart.forEach((_, key) => {
                if (!validKeys.has(key)) player.mergeStart.delete(key);
            });

            // Union all overlapping dots that are ready to merge
            overlaps.forEach(([dot1, dot2, key]) => {
                if (player.mergeStart.get(key) && Date.now() - player.mergeStart.get(key) >= 2000) {
                    union(dot1, dot2);
                }
            });

            // Group dots by their roots and find earliest merge time
            let groups = new Map();
            allDots.forEach(dot => {
                let root = find(dot);
                if (!groups.has(root)) groups.set(root, { dots: [], startTime: Infinity });
                groups.get(root).dots.push(dot);
                let dotIndex = allDots.indexOf(dot);
                let minKey = Array.from(player.mergeStart.keys())
                    .filter(k => k.split('-').map(Number).includes(dotIndex))
                    .sort((a, b) => player.mergeStart.get(a) - player.mergeStart.get(b))[0];
                if (minKey) {
                    let time = player.mergeStart.get(minKey);
                    if (time < groups.get(root).startTime) groups.get(root).startTime = time;
                }
            });

            // Process merges for groups ready to combine
            groups.forEach((group, root) => {
                if (group.dots.length > 1 && group.startTime <= Date.now() - 2000) {
                    let totalRadius = 0;
                    let weightedX = 0;
                    let weightedY = 0;
                    group.dots.forEach(dot => {
                        totalRadius += dot.radius;
                        weightedX += dot.x * dot.radius;
                        weightedY += dot.y * dot.radius;
                    });
                    let newRadius = totalRadius;
                    let avgX = totalRadius > 0 ? weightedX / totalRadius : group.dots[0].x;
                    let avgY = totalRadius > 0 ? weightedY / totalRadius : group.dots[0].y;

                    // Choose target dot (prefer main player if in group, else largest twin)
                    let targetDot = group.dots.includes(player) ? player : group.dots.reduce((max, dot) => 
                        dot.radius > max.radius ? dot : max, group.dots[0]);
                    targetDot.x = avgX;
                    targetDot.y = avgY;
                    targetDot.radius = newRadius;
                    targetDot.speed = targetDot.calculateSpeed();

                    // Update twins, keeping only non-merged dots
                    let mergedDots = new Set(group.dots);
                    player.twins = player.twins.filter(t => !mergedDots.has(t));
                    if (!mergedDots.has(player) && targetDot !== player) {
                        player.x = targetDot.x;
                        player.y = targetDot.y;
                        player.radius = targetDot.radius;
                        player.speed = player.calculateSpeed();
                        player.twins = player.twins.filter(t => t !== targetDot);
                    }
                    player.split = player.twins.length > 0;

                    // Clear merge timers for this group
                    player.mergeStart.forEach((_, key) => {
                        let [i, j] = key.split('-').map(Number);
                        if (mergedDots.has(allDots[i]) || mergedDots.has(allDots[j])) {
                            player.mergeStart.delete(key);
                        }
                    });
                }
            });
        }

        function checkCollisions() {
            checkMergeCollisions(player);
            bots.forEach(bot => checkMergeCollisions(bot));

            foods = foods.filter(food => {
                let dist = distance(player.x, player.y, food.x, food.y);
                if (dist < player.radius + food.radius) {
                    player.radius += 1;
                    player.speed = player.calculateSpeed();
                    player.totalPoints += 1; // Increment total points for food
                    return false;
                }
                for (let twin of player.twins) {
                    dist = distance(twin.x, twin.y, food.x, food.y);
                    if (dist < twin.radius + food.radius) {
                        twin.radius += 1;
                        twin.speed = twin.calculateSpeed();
                        player.totalPoints += 1; // Increment total points for food
                        return false;
                    }
                }
                for (let bot of bots) {
                    dist = distance(bot.x, bot.y, food.x, food.y);
                    if (dist < bot.radius + food.radius) {
                        bot.radius += 1;
                        bot.speed = bot.calculateSpeed();
                        bot.totalPoints += 1; // Increment bot total points
                        return false;
                    }
                    for (let twin of bot.twins) {
                        dist = distance(twin.x, twin.y, food.x, food.y);
                        if (dist < twin.radius + food.radius) {
                            twin.radius += 1;
                            twin.speed = twin.calculateSpeed();
                            bot.totalPoints += 1; // Increment bot total points
                            return false;
                        }
                    }
                }
                return true;
            });

            // Handle player vs bot collisions
            bots.forEach((bot, botIndex) => {
                let allPlayerDots = [player, ...player.twins];
                let allBotDots = [bot, ...bot.twins];

                allPlayerDots.forEach((playerDot, playerIndex) => {
                    allBotDots.forEach((botDot, botDotIndex) => {
                        let dist = distance(playerDot.x, playerDot.y, botDot.x, botDot.y);
                        if (dist < playerDot.radius + botDot.radius) {
                            let playerThreshold = getCollisionThreshold(playerDot.radius);
                            let botThreshold = getCollisionThreshold(botDot.radius);
                            if (playerDot.radius >= botDot.radius + playerThreshold) {
                                player.totalPoints += botDot.radius;
                                player.botsAbsorbed += 1;
                                playerDot.radius = Math.sqrt(playerDot.radius * playerDot.radius + botDot.radius * botDot.radius);
                                playerDot.speed = playerDot.calculateSpeed();
                                if (botDot === bot) {
                                    bot.x = Math.random() * (canvas.width - 50) + 25;
                                    bot.y = Math.random() * (canvas.height - 50) + 25;
                                    bot.radius = randomRadius();
                                    bot.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                                    bot.speed = bot.calculateSpeed();
                                    bot.twins = [];
                                    bot.split = false;
                                    bot.mergeStart.clear();
                                    bot.lastSplitTime = Date.now();
                                    bot.totalPoints = bot.radius;
                                    bot.botsAbsorbed = 0;
                                } else {
                                    bot.twins = bot.twins.filter(t => t !== botDot);
                                    bot.split = bot.twins.length > 0;
                                }
                            } else if (botDot.radius >= playerDot.radius + botThreshold) {
                                bot.totalPoints += playerDot.radius;
                                bot.botsAbsorbed += 1;
                                botDot.radius = Math.sqrt(botDot.radius * botDot.radius + playerDot.radius * playerDot.radius);
                                botDot.speed = botDot.calculateSpeed();
                                if (playerDot === player) {
                                    if (player.twins.length > 0) {
                                        let largestTwin = player.twins.reduce((max, twin) => 
                                            twin.radius > max.radius ? twin : max, player.twins[0]);
                                        player.x = largestTwin.x;
                                        player.y = largestTwin.y;
                                        player.radius = largestTwin.radius;
                                        player.speed = largestTwin.calculateSpeed();
                                        player.dx = largestTwin.dx;
                                        player.dy = largestTwin.dy;
                                        player.twins = player.twins.filter(t => t !== largestTwin);
                                        player.split = player.twins.length > 0;
                                    } else {
                                        player.x = Math.random() * (canvas.width - 50) + 25;
                                        player.y = Math.random() * (canvas.height - 50) + 25;
                                        player.radius = randomRadius();
                                        player.speed = player.calculateSpeed();
                                        player.twins = [];
                                        player.split = false;
                                        player.mergeStart.clear();
                                        player.totalPoints = player.radius;
                                        player.botsAbsorbed = 0;
                                    }
                                } else {
                                    player.twins = player.twins.filter(t => t !== playerDot);
                                    player.split = player.twins.length > 0;
                                }
                            }
                        }
                    });
                });
            });

            // Handle bot vs bot collisions
            bots.forEach((bot1, i) => {
                bots.forEach((bot2, j) => {
                    if (i < j) {
                        let allBot1Dots = [bot1, ...bot1.twins];
                        let allBot2Dots = [bot2, ...bot2.twins];

                        allBot1Dots.forEach((bot1Dot) => {
                            allBot2Dots.forEach((bot2Dot) => {
                                let dist = distance(bot1Dot.x, bot1Dot.y, bot2Dot.x, bot2Dot.y);
                                if (dist < bot1Dot.radius + bot2Dot.radius) {
                                    let threshold1 = getCollisionThreshold(bot1Dot.radius);
                                    let threshold2 = getCollisionThreshold(bot2Dot.radius);
                                    if (bot1Dot.radius >= bot2Dot.radius + threshold1) {
                                        bot1.totalPoints += bot2Dot.radius;
                                        bot1.botsAbsorbed += 1;
                                        bot1Dot.radius = Math.sqrt(bot1Dot.radius * bot1Dot.radius + bot2Dot.radius * bot2Dot.radius);
                                        bot1Dot.speed = bot1Dot.calculateSpeed();
                                        if (bot2Dot === bot2) {
                                            bot2.x = Math.random() * (canvas.width - 50) + 25;
                                            bot2.y = Math.random() * (canvas.height - 50) + 25;
                                            bot2.radius = randomRadius();
                                            bot2.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                                            bot2.speed = bot2.calculateSpeed();
                                            bot2.twins = [];
                                            bot2.split = false;
                                            bot2.mergeStart.clear();
                                            bot2.lastSplitTime = Date.now();
                                            bot2.totalPoints = bot2.radius;
                                            bot2.botsAbsorbed = 0;
                                        } else {
                                            bot2.twins = bot2.twins.filter(t => t !== bot2Dot);
                                            bot2.split = bot2.twins.length > 0;
                                        }
                                    } else if (bot2Dot.radius >= bot1Dot.radius + threshold2) {
                                        bot2.totalPoints += bot1Dot.radius;
                                        bot2.botsAbsorbed += 1;
                                        bot2Dot.radius = Math.sqrt(bot2Dot.radius * bot2Dot.radius + bot1Dot.radius * bot1Dot.radius);
                                        bot2Dot.speed = bot2Dot.calculateSpeed();
                                        if (bot1Dot === bot1) {
                                            bot1.x = Math.random() * (canvas.width - 50) + 25;
                                            bot1.y = Math.random() * (canvas.height - 50) + 25;
                                            bot1.radius = randomRadius();
                                            bot1.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                                            bot1.speed = bot1.calculateSpeed();
                                            bot1.twins = [];
                                            bot1.split = false;
                                            bot1.mergeStart.clear();
                                            bot1.lastSplitTime = Date.now();
                                            bot1.totalPoints = bot1.radius;
                                            bot1.botsAbsorbed = 0;
                                        } else {
                                            bot1.twins = bot1.twins.filter(t => t !== bot1Dot);
                                            bot1.split = bot1.twins.length > 0;
                                        }
                                    }
                                }
                            });
                        });
                    }
                });
            });
        }

        // Game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            let deltaTime = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayerDirection();
            player.move(deltaTime);
            bots.forEach(bot => {
                bot.move(deltaTime);
                // Random bot splitting every 30-90 seconds
                if (Date.now() - bot.lastSplitTime >= 30000 && Math.random() < deltaTime) {
                    let splitCount = Math.random() < 0.5 ? 1 : 2;
                    for (let i = 0; i < splitCount && bot.canSplit(); i++) {
                        let randomDx = (Math.random() - 0.5) * 2;
                        let randomDy = (Math.random() - 0.5) * 2;
                        let mag = Math.sqrt(randomDx * randomDx + randomDy * randomDy);
                        if (mag > 0) {
                            randomDx /= mag;
                            randomDy /= mag;
                        }
                        bot.splitPlayer(randomDx, randomDy);
                    }
                    bot.lastSplitTime = Date.now() + Math.random() * 60000; // Next split in 30-90s
                }
            });
            checkCollisions();

            if (foods.length < 50) {
                foods.push(new Food(Math.random() * canvas.width, Math.random() * canvas.height));
            }

            // Update score display
            highScore = Math.max(highScore, player.totalPoints);
            localStorage.setItem('agarHighScore', highScore); // Save to localStorage
            totalPointsDisplay.textContent = `Total Points: ${Math.round(player.totalPoints)}`;
            currentPointsDisplay.textContent = `Current Points: ${Math.round(player.calculateTotalPoints())}`;
            botsAbsorbedDisplay.textContent = `Bots Absorbed: ${player.botsAbsorbed}`;
            highScoreDisplay.textContent = `High Score: ${Math.round(highScore)}`;

            foods.forEach(food => food.draw());
            bots.forEach(bot => bot.draw());
            player.draw();

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);


        // JavaScript code to retrieve and apply dark mode status
        document.addEventListener('DOMContentLoaded', () => {
            const isDarkMode = localStorage.getItem('darkMode');
            const body = document.body;

            // Check if dark mode status exists and apply it
            if (isDarkMode === 'enabled') {
                body.classList.add('dark-mode');
            }
        });


    </script>
</body>
</html>
