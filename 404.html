<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
<link rel="stylesheet" href="styles.css">

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#000222">
<meta name="apple-mobile-web-app-title" content="Ron Lab">
<meta name="application-name" content="Ron Lab">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="theme-color" content="#ffffff">

<!-- Apple Mobile Web App Status Bar Style -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

</head>
<body>
    <div class="container">
        <h1>404 - Page Not Found</h1>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <li><a href="https://status.ronlab.site">Check Site Status</a></li>
        <a href="/">Go to the Home Page</a>
    </div>
    <footer>
        <p>&copy; 2023 ron</p>
    </footer>

</body>
<script>
        // JavaScript code to retrieve and apply dark mode status
        document.addEventListener('DOMContentLoaded', () => {
            const isDarkMode = localStorage.getItem('darkMode');
            const body = document.body;

            // Check if dark mode status exists and apply it
            if (isDarkMode === 'enabled') {
                body.classList.add('dark-mode');
            }
        });
</script>
</html>
